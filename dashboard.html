<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMMOCAM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#fafaf9;--surface:#ffffff;--surface2:#f5f5f4;--border:#e7e5e4;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --accent:#1e3a5f;--accent2:#2d5a8e;--green:#16a34a;--red:#dc2626;--blue:#1e3a5f;--yellow:#b45309;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}

/* TOPBAR */
header{padding:1.25rem 2.5rem;display:flex;align-items:center;gap:2rem;border-bottom:1px solid var(--border);background:var(--surface)}
header .logo{font-size:1.15rem;font-weight:700;letter-spacing:-.02em;color:var(--accent)}
header .logo span{color:#8b5e3c}
header nav{display:flex;gap:.25rem;background:var(--surface);border-radius:var(--radius-sm);padding:3px}
header nav button{padding:.45rem 1rem;border:none;background:none;color:var(--text3);font-size:.8rem;font-weight:500;cursor:pointer;border-radius:6px;transition:all .2s}
header nav button.active{background:var(--accent);color:#fff}
header nav button:hover:not(.active){color:var(--text)}
header .meta{margin-left:auto;display:flex;gap:1.5rem;font-size:.78rem;color:var(--text3)}
header .meta .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:.4rem}

/* FILTERS */
.filter-bar{padding:.75rem 2.5rem;display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border)}
.filter-bar select,.filter-bar input[type=text],.filter-bar input[type=number]{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  padding:.45rem .75rem;border-radius:var(--radius-sm);font-size:.78rem;font-family:inherit;outline:none;transition:border .2s}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--accent)}
.filter-bar input::placeholder{color:var(--text3)}
.pill{padding:.35rem .75rem;border-radius:20px;font-size:.72rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text3);transition:all .2s}
.pill:hover{border-color:var(--text2);color:var(--text2)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-bar label{font-size:.75rem;color:var(--text3);display:flex;align-items:center;gap:.35rem;cursor:pointer}
.filter-bar label input{accent-color:var(--accent)}

/* MAIN */
.main{padding:1rem 2.5rem;flex:1}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;min-height:60vh}
.kanban-col{display:flex;flex-direction:column;min-height:200px}
.col-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:.5rem 0 .75rem;display:flex;align-items:center;gap:.5rem}
.col-label .cnt{background:var(--surface2);padding:.15rem .5rem;border-radius:10px;font-size:.65rem;font-weight:500;color:var(--text3)}
.col-nouveau .col-label{color:#16a34a}
.col-averifier .col-label{color:#b45309}
.col-acontacter .col-label{color:#1e3a5f}
.col-simulation .col-label{color:#8b5e3c}

/* CARD */
.card{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s;border:1px solid transparent}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.card-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:.6rem}
.card-head h4{font-size:.82rem;font-weight:600;line-height:1.35;color:var(--text)}
.grade{font-size:.7rem;font-weight:700;padding:.2rem .5rem;border-radius:6px;letter-spacing:.02em}
.grade-A{background:#dcfce7;color:#15803d}
.grade-B{background:#fef3c7;color:#92400e}
.grade-C{background:#fee2e2;color:#b91c1c}
.grade-D{background:var(--surface2);color:var(--text3)}
.card-metric{display:flex;justify-content:space-between;padding:.15rem 0;font-size:.75rem}
.card-metric .k{color:var(--text3)}
.card-metric .v{color:var(--text2);font-weight:500}
.card-metric .v.up{color:var(--green)}.card-metric .v.down{color:var(--red)}.card-metric .v.neutral{color:var(--yellow)}
.card-tags{display:flex;gap:.35rem;margin-top:.6rem;flex-wrap:wrap}
.tag{font-size:.62rem;font-weight:500;padding:.15rem .45rem;border-radius:4px;letter-spacing:.02em}
.tag-src{background:#e7e5e4;color:#78716c}
.tag-drop{background:#fee2e2;color:#b91c1c}
.tag-new{background:#dcfce7;color:#15803d}
.card-btns{display:flex;gap:.35rem;margin-top:.6rem;opacity:0;transition:opacity .2s}
.card:hover .card-btns{opacity:1}
.card-btns button{flex:1;padding:.3rem;border:none;border-radius:6px;font-size:.6rem;cursor:pointer;background:var(--surface2);color:var(--text3);transition:all .15s}
.card-btns button:hover{background:var(--accent);color:#fff}

/* TABLEAU */
.tbl-wrap{display:none;overflow:auto;max-height:75vh}
.tbl-wrap table{width:100%;border-collapse:separate;border-spacing:0;font-size:.78rem}
.tbl-wrap th{background:var(--surface);color:var(--text3);font-weight:500;text-align:left;padding:.65rem .8rem;position:sticky;top:0;cursor:pointer;white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.tbl-wrap th:first-child{border-radius:var(--radius-sm) 0 0 0}
.tbl-wrap th:last-child{border-radius:0 var(--radius-sm) 0 0}
.tbl-wrap td{padding:.6rem .8rem;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text2)}
.tbl-wrap tr{transition:background .15s}
.tbl-wrap tr:hover td{background:var(--surface)}
.tbl-wrap .num{text-align:right;font-variant-numeric:tabular-nums}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-520px;width:500px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transition:right .3s ease;box-shadow:-10px 0 40px rgba(0,0,0,.08)}
.drawer.open{right:0}
.drawer-head{padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.drawer-head h2{font-size:.95rem;font-weight:600}
.drawer-head button{background:none;border:none;color:var(--text3);font-size:1.4rem;cursor:pointer;padding:.25rem;transition:color .15s}
.drawer-head button:hover{color:var(--text)}
.drawer-body{flex:1;overflow-y:auto;padding:1.5rem}
.section{margin-bottom:1.75rem}
.section h3{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.65rem}
.row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.8rem}
.row .k{color:var(--text3)}.row .v{color:var(--text);font-weight:500}
.bar{height:4px;background:var(--surface2);border-radius:2px;margin:.2rem 0 .4rem;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.notes{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.65rem;border-radius:var(--radius-sm);font-size:.8rem;font-family:inherit;min-height:70px;resize:vertical;outline:none;transition:border .2s}
.notes:focus{border-color:var(--accent)}
.alert-item{font-size:.75rem;color:var(--red);padding:.15rem 0}
.drawer-foot{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.5rem}
.drawer-foot button{flex:1;padding:.6rem;border:none;border-radius:var(--radius-sm);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}

/* SIM */
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.sim-box{background:var(--surface);border-radius:var(--radius-sm);padding:.85rem}
.sim-box h4{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:.55rem}
.sim-row{display:flex;justify-content:space-between;font-size:.78rem;padding:.15rem 0}
.sim-row .sk{color:var(--text3)}.sim-row .sv{color:var(--text);font-weight:500}
.sim-total{border-top:1px solid var(--border);margin-top:.3rem;padding-top:.35rem}

.empty{text-align:center;padding:3rem;color:var(--text3);font-size:.82rem}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<header>
  <div class="logo">IMMO<span>CAM</span></div>
  <nav>
    <button class="active" data-view="kanban">Kanban</button>
    <button data-view="tableau">Tableau</button>
  </nav>
  <div class="meta">
    <span><span class="dot" style="background:var(--green)"></span><span id="sNew">0</span> nouveaux</span>
    <span><span class="dot" style="background:var(--red)"></span><span id="sDrop">0</span> baisses</span>
    <span id="sTotal" style="color:var(--text2)">0 deals</span>
  </div>
</header>

<div class="filter-bar">
  <select id="fSource"><option value="">Toutes sources</option></select>
  <select id="fDept"><option value="">Tous depts</option></select>
  <select id="fScore"><option value="">Score</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
  <input id="fSurfMin" type="number" placeholder="m² min" style="width:72px" />
  <input id="fSurfMax" type="number" placeholder="m² max" style="width:72px" />
  <input id="fPrixMax" type="number" placeholder="Prix max (M)" style="width:95px" />
  <button class="pill" id="fBaisse">Baisse prix</button>
  <label><input type="checkbox" id="fArchive"> Archives</label>
  <input id="fSearch" type="text" placeholder="Rechercher..." style="flex:1;min-width:140px" />
</div>

<div class="main">
  <div class="kanban" id="viewKanban">
    <div class="kanban-col col-nouveau"><div class="col-label">Nouveau <span class="cnt" id="cN">0</span></div><div id="colN"></div></div>
    <div class="kanban-col col-averifier"><div class="col-label">A verifier <span class="cnt" id="cV">0</span></div><div id="colV"></div></div>
    <div class="kanban-col col-acontacter"><div class="col-label">A contacter <span class="cnt" id="cC">0</span></div><div id="colC"></div></div>
    <div class="kanban-col col-simulation"><div class="col-label">Simulation <span class="cnt" id="cS">0</span></div><div id="colS"></div></div>
  </div>
  <div class="tbl-wrap" id="viewTableau"><table><thead id="tH"></thead><tbody id="tB"></tbody></table></div>
</div>

<div class="overlay" id="ov"></div>
<div class="drawer" id="dw">
  <div class="drawer-head"><h2 id="dwTitle">Detail</h2><button id="dwClose">&times;</button></div>
  <div class="drawer-body" id="dwBody"></div>
  <div class="drawer-foot">
    <button class="btn-ghost" id="dwTrash">Archiver</button>
    <button class="btn-ghost" id="dwVerify">Verifier</button>
    <button class="btn-ghost" id="dwContact" style="color:var(--blue)">Contacter</button>
    <button class="btn-primary" id="dwSim">Simuler</button>
  </div>
</div>

<script>
const REPO="Bencode92/IMMOCAM",DVFMAJ="Bencode92/DVFMAJ";
const RAW="https://raw.githubusercontent.com/"+REPO+"/main";
const RAW_D="https://raw.githubusercontent.com/"+DVFMAJ+"/main";
let D={},REF=null,curKey=null,view="kanban",tCol=null,tAsc=true;

async function init(){
  try{const r=await fetch(RAW+"/data/deals_db.json");if(r.ok){const j=await r.json();D=j.deals||{};}}catch(e){}
  try{const r=await fetch(RAW_D+"/output/referentiel_bureaux.json");if(r.ok)REF=await r.json();}catch(e){}
  if(!Object.keys(D).length)loadDemo();
  popFilters();render();
}

function loadDemo(){
  const ds=[
    {k:"d1",s:"nouveau",c:"Paris 8e Arrondissement",d:"75",a:"45 rue de Courcelles",sf:485,px:3200000,dpe:"D",lo:185000,sc:78,g:"A",ec:-40.3,src:["bureauxlocaux","geolocaux"],hi:[]},
    {k:"d2",s:"nouveau",c:"Boulogne-Billancourt",d:"92",a:"12 rue du Chateau",sf:320,px:1800000,dpe:"C",lo:95000,sc:65,g:"B",ec:-15.2,src:["bureauxlocaux"],hi:[]},
    {k:"d3",s:"a_verifier",c:"Paris 11e Arrondissement",d:"75",a:"89 avenue Parmentier",sf:380,px:2500000,dpe:"E",lo:0,sc:52,g:"C",ec:-8.1,src:["loopnet"],hi:[{d:"2026-04-01",p:2800000},{d:"2026-04-10",p:2500000}]},
    {k:"d4",s:"a_contacter",c:"Issy-les-Moulineaux",d:"92",a:"5 rue Ernest Renan",sf:600,px:3100000,dpe:"B",lo:210000,sc:82,g:"A",ec:-25,src:["geolocaux","investisseur-immo"],hi:[]},
    {k:"d5",s:"simulation",c:"Paris 15e Arrondissement",d:"75",a:"120 rue de Vaugirard",sf:450,px:4200000,dpe:"C",lo:280000,sc:71,g:"B",ec:-8.5,src:["bureauxlocaux"],hi:[]},
    {k:"d6",s:"nouveau",c:"Paris 17e Arrondissement",d:"75",a:"30 rue de Levis",sf:700,px:4500000,dpe:"D",lo:0,sc:68,g:"B",ec:-22,src:["bnp-pre"],hi:[]},
    {k:"d7",s:"nouveau",c:"Levallois-Perret",d:"92",a:"18 rue Rivay",sf:350,px:2600000,dpe:"C",lo:165000,sc:73,g:"B",ec:-18.7,src:["bureauxlocaux","loopnet","geolocaux"],hi:[{d:"2026-04-01",p:2900000},{d:"2026-04-08",p:2600000}]},
    {k:"d8",s:"nouveau",c:"Nanterre",d:"92",a:"4 rue des Trois Fontanot",sf:520,px:2200000,dpe:"D",lo:140000,sc:75,g:"B",ec:-28,src:["loopnet"],hi:[]},
  ];
  for(const x of ds){
    D[x.k]={_statut:x.s,_first_seen:"2026-04-13",_last_seen:"2026-04-13",_sources:x.src,_notes:"",
      _prix_historique:x.hi.length?x.hi:[{d:"2026-04-13",p:x.px}],
      source:x.src[0],url:"#",
      localisation:{adresse:x.a,commune:x.c,departement:x.d},
      bien:{surface_m2:x.sf,dpe:x.dpe},
      financier:{prix_affiche:x.px,prix_m2:Math.round(x.px/x.sf)},
      locatif:{loyer_actuel_an:x.lo,loyer_m2_an:x.lo?Math.round(x.lo/x.sf):0},
      annonce:{titre:`Bureaux ${x.sf}m\u00B2 \u2014 ${x.c}`},
      scoring:{score_global:x.sc,grade:x.g,prix_vs_marche_pct:x.ec,scores_detail:{prix:x.sc,loyer:60,rendement:55,risque:50},alertes:x.dpe>="D"?[`DPE ${x.dpe}`]:[]},
    };
  }
}

function popFilters(){
  const ss=new Set,dd=new Set;
  for(const v of Object.values(D)){(v._sources||[]).forEach(s=>ss.add(s));const dp=v.localisation?.departement;if(dp)dd.add(dp);}
  const fS=document.getElementById("fSource");ss.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;fS.appendChild(o);});
  const fD=document.getElementById("fDept");[...dd].sort().forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;fD.appendChild(o);});
}

function filtered(){
  const fs=document.getElementById("fSource").value,fd=document.getElementById("fDept").value,fg=document.getElementById("fScore").value;
  const sn=parseFloat(document.getElementById("fSurfMin").value)||0,sx=parseFloat(document.getElementById("fSurfMax").value)||999999;
  const px=(parseFloat(document.getElementById("fPrixMax").value)||999)*1e6;
  const fb=document.getElementById("fBaisse").classList.contains("active"),fa=document.getElementById("fArchive").checked;
  const fq=document.getElementById("fSearch").value.toLowerCase();
  return Object.entries(D).filter(([,d])=>{
    if(!fa&&d._statut==="poubelle")return false;
    if(fs&&!(d._sources||[]).includes(fs))return false;
    if(fd&&d.localisation?.departement!==fd)return false;
    if(fg&&d.scoring?.grade!==fg)return false;
    const sf=d.bien?.surface_m2||0;if(sf<sn||sf>sx)return false;
    if((d.financier?.prix_affiche||0)>px)return false;
    if(fb&&(d._prix_historique||[]).length<2)return false;
    if(fq){const t=(d.localisation?.commune+" "+d.localisation?.adresse+" "+d.annonce?.titre).toLowerCase();if(!t.includes(fq))return false;}
    return true;
  });
}

["fSource","fDept","fScore","fSurfMin","fSurfMax","fPrixMax","fSearch","fArchive"].forEach(id=>{
  const el=document.getElementById(id);el.addEventListener("input",()=>render());el.addEventListener("change",()=>render());
});
document.getElementById("fBaisse").addEventListener("click",function(){this.classList.toggle("active");render();});

document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));b.classList.add("active");
  view=b.dataset.view;
  document.getElementById("viewKanban").style.display=view==="kanban"?"grid":"none";
  document.getElementById("viewTableau").style.display=view==="tableau"?"block":"none";
  render();
}));

function render(){
  const deals=filtered();
  document.getElementById("sTotal").textContent=deals.length+" deals";
  document.getElementById("sNew").textContent=deals.filter(([,d])=>d._statut==="nouveau").length;
  document.getElementById("sDrop").textContent=deals.filter(([,d])=>(d._prix_historique||[]).length>=2).length;
  if(view==="kanban")renderK(deals);else renderT(deals);
}

function renderK(deals){
  const cols={nouveau:[],a_verifier:[],a_contacter:[],simulation:[]};
  for(const[k,d]of deals){const s=d._statut||"nouveau";if(cols[s])cols[s].push([k,d]);}
  const map={nouveau:"colN",a_verifier:"colV",a_contacter:"colC",simulation:"colS"};
  const cnt={nouveau:"cN",a_verifier:"cV",a_contacter:"cC",simulation:"cS"};
  for(const[s,items]of Object.entries(cols)){
    document.getElementById(cnt[s]).textContent=items.length;
    document.getElementById(map[s]).innerHTML=items.length?items.map(([k,d])=>mkCard(k,d)).join(""):'<div class="empty">Aucun deal</div>';
  }
}

function mkCard(key,d){
  const s=d.scoring||{},px=d.financier?.prix_affiche||0,pm=d.financier?.prix_m2||0,sf=d.bien?.surface_m2||0;
  const c=d.localisation?.commune||"",g=s.grade||"?",ec=s.prix_vs_marche_pct;
  const ecCls=ec!=null?(ec<=-20?"up":ec<=0?"neutral":"down"):"";
  const src=d._sources||[],hi=d._prix_historique||[];
  const drop=hi.length>=2&&hi[hi.length-1].p<hi[hi.length-2].p;
  const dropK=drop?Math.round((hi[hi.length-1].p-hi[hi.length-2].p)/1e3):0;
  return `<div class="card" onclick="openDw('${key}')">
    <div class="card-head"><h4>${sf}m\u00B2 \u2014 ${c}</h4><span class="grade grade-${g}">${g}</span></div>
    <div class="card-metric"><span class="k">Prix</span><span class="v">${(px/1e6).toFixed(2)}M\u20AC</span></div>
    <div class="card-metric"><span class="k">\u20AC/m\u00B2</span><span class="v">${pm.toLocaleString("fr")}</span></div>
    <div class="card-metric"><span class="k">vs march\u00E9</span><span class="v ${ecCls}">${ec!=null?(ec>0?"+":"")+ec.toFixed(1)+"%":"\u2014"}</span></div>
    ${d.bien?.dpe?`<div class="card-metric"><span class="k">DPE</span><span class="v">${d.bien.dpe}</span></div>`:""}
    <div class="card-tags">
      ${src.length>1?`<span class="tag tag-src">${src.length} sources</span>`:""}
      ${drop?`<span class="tag tag-drop">\u2193 ${dropK}K\u20AC</span>`:""}
      ${!drop&&hi.length<=1?'<span class="tag tag-new">NEW</span>':""}
    </div>
    <div class="card-btns">
      <button onclick="event.stopPropagation();setSt('${key}','poubelle')">Archive</button>
      <button onclick="event.stopPropagation();setSt('${key}','a_verifier')">V\u00E9rifier</button>
      <button onclick="event.stopPropagation();setSt('${key}','a_contacter')">Contact</button>
      <button onclick="event.stopPropagation();setSt('${key}','simulation')">Simuler</button>
    </div>
  </div>`;
}

function renderT(deals){
  const cols=[{k:"_statut",l:"Statut"},{k:"commune",l:"Commune"},{k:"surface",l:"Surface",n:1},{k:"prix",l:"Prix",n:1},{k:"prix_m2",l:"\u20AC/m\u00B2",n:1},{k:"ecart",l:"vs March\u00E9",n:1},{k:"dpe",l:"DPE"},{k:"loyer",l:"Loyer",n:1},{k:"yield",l:"Yield",n:1},{k:"grade",l:"Score"},{k:"sources",l:"Src",n:1}];
  let rows=deals.map(([k,d])=>({k,_statut:d._statut,commune:d.localisation?.commune||"",surface:d.bien?.surface_m2||0,prix:d.financier?.prix_affiche||0,prix_m2:d.financier?.prix_m2||0,ecart:d.scoring?.prix_vs_marche_pct,dpe:d.bien?.dpe||"",loyer:d.locatif?.loyer_actuel_an||0,yield:d.locatif?.loyer_actuel_an&&d.financier?.prix_affiche?(d.locatif.loyer_actuel_an/d.financier.prix_affiche*100):0,grade:d.scoring?.grade||"?",sources:(d._sources||[]).length}));
  if(tCol)rows.sort((a,b)=>{let va=a[tCol],vb=b[tCol];if(va==null)return 1;if(vb==null)return -1;return typeof va==="string"?(tAsc?va.localeCompare(vb):vb.localeCompare(va)):(tAsc?va-vb:vb-va);});
  const ar=k=>tCol===k?(tAsc?" \u25B2":" \u25BC"):"";
  const stI={nouveau:"\uD83C\uDD95",a_verifier:"\uD83D\uDD0D",a_contacter:"\uD83D\uDCDE",simulation:"\uD83D\uDCB0",poubelle:"\uD83D\uDDD1"};
  document.getElementById("tH").innerHTML="<tr>"+cols.map(c=>`<th class="${c.n?'num':''}" onclick="tSort('${c.k}')">${c.l}${ar(c.k)}</th>`).join("")+"</tr>";
  const eC=v=>v==null?"":(v<=-20?"color:var(--green)":v<=0?"color:var(--yellow)":"color:var(--red)");
  document.getElementById("tB").innerHTML=rows.map(r=>`<tr onclick="openDw('${r.k}')" style="cursor:pointer">
    <td>${stI[r._statut]||r._statut}</td><td>${r.commune}</td><td class="num">${r.surface}m\u00B2</td>
    <td class="num">${(r.prix/1e6).toFixed(2)}M\u20AC</td><td class="num">${r.prix_m2.toLocaleString("fr")}</td>
    <td class="num" style="${eC(r.ecart)}">${r.ecart!=null?(r.ecart>0?"+":"")+r.ecart.toFixed(1)+"%":"\u2014"}</td>
    <td>${r.dpe}</td><td class="num">${r.loyer>0?(r.loyer/1e3).toFixed(0)+"K\u20AC":"\u2014"}</td>
    <td class="num">${r.yield>0?r.yield.toFixed(1)+"%":"\u2014"}</td>
    <td><span class="grade grade-${r.grade}">${r.grade}</span></td><td class="num">${r.sources}</td>
  </tr>`).join("");
}
window.tSort=k=>{if(tCol===k)tAsc=!tAsc;else{tCol=k;tAsc=true;}render();};

// DRAWER
window.openDw=key=>{
  curKey=key;const d=D[key];if(!d)return;
  document.getElementById("dw").classList.add("open");document.getElementById("ov").classList.add("open");
  document.getElementById("dwTitle").textContent=d.annonce?.titre||"D\u00E9tail";
  const s=d.scoring||{},f=d.financier||{},l=d.locatif||{},b=d.bien||{},hi=d._prix_historique||[];
  const det=s.scores_detail||{};
  const bFill=(v,c)=>`<div class="bar"><div class="bar-fill" style="width:${v}%;background:${c}"></div></div>`;
  const bCol=v=>v>=70?"var(--green)":v>=40?"var(--yellow)":"var(--red)";

  let h=`<div class="section"><h3>Localisation</h3>
    <div class="row"><span class="k">Adresse</span><span class="v">${d.localisation?.adresse||"\u2014"}</span></div>
    <div class="row"><span class="k">Commune</span><span class="v">${d.localisation?.commune||"\u2014"}</span></div>
    <div class="row"><span class="k">Sources</span><span class="v">${(d._sources||[]).join(", ")}</span></div>
    <div class="row"><span class="k">Premier vu</span><span class="v">${d._first_seen||"\u2014"}</span></div></div>

    <div class="section"><h3>Score \u2014 ${s.grade||"?"} (${s.score_global||0}/100)</h3>
    ${Object.entries(det).map(([k,v])=>`<div class="row"><span class="k">${k}</span><span class="v">${Math.round(v)}</span></div>${bFill(v,bCol(v))}`).join("")}
    ${(s.alertes||[]).map(a=>`<div class="alert-item">\u26A0 ${a}</div>`).join("")}</div>

    <div class="section"><h3>Financier</h3>
    <div class="row"><span class="k">Prix</span><span class="v">${f.prix_affiche?(f.prix_affiche/1e6).toFixed(2)+"M\u20AC":"\u2014"}</span></div>
    <div class="row"><span class="k">\u20AC/m\u00B2</span><span class="v">${f.prix_m2?f.prix_m2.toLocaleString("fr"):"\u2014"}</span></div>
    <div class="row"><span class="k">vs march\u00E9</span><span class="v" style="${s.prix_vs_marche_pct!=null?(s.prix_vs_marche_pct<=-20?"color:var(--green)":"color:var(--yellow)"):""}">
      ${s.prix_vs_marche_pct!=null?s.prix_vs_marche_pct.toFixed(1)+"%":"\u2014"}</span></div></div>

    <div class="section"><h3>Bien</h3>
    <div class="row"><span class="k">Surface</span><span class="v">${b.surface_m2||"\u2014"} m\u00B2</span></div>
    <div class="row"><span class="k">DPE</span><span class="v">${b.dpe||"\u2014"}</span></div>
    <div class="row"><span class="k">Parking</span><span class="v">${b.parking||"\u2014"}</span></div></div>

    <div class="section"><h3>Locatif</h3>
    <div class="row"><span class="k">Loyer/an</span><span class="v">${l.loyer_actuel_an?l.loyer_actuel_an.toLocaleString("fr")+"\u20AC":"Vacant"}</span></div>
    <div class="row"><span class="k">Yield brut</span><span class="v">${f.prix_affiche&&l.loyer_actuel_an?(l.loyer_actuel_an/f.prix_affiche*100).toFixed(2)+"%":"\u2014"}</span></div></div>

    ${hi.length>1?`<div class="section"><h3>Historique prix</h3>${hi.map(x=>`<div class="row"><span class="k">${x.d||x.date}</span><span class="v">${((x.p||x.prix)/1e6).toFixed(2)}M\u20AC</span></div>`).join("")}</div>`:""}

    <div class="section"><h3>Notes</h3><textarea class="notes" id="dwNotes">${d._notes||""}</textarea></div>

    ${d._statut==="simulation"?mkSim(d):""}

    <a href="${d.url||"#"}" target="_blank" style="font-size:.82rem">Voir l'annonce \u2192</a>`;

  document.getElementById("dwBody").innerHTML=h;
};

function mkSim(d){
  const px=d.financier?.prix_affiche||0,sf=d.bien?.surface_m2||1,lo=d.locatif?.loyer_actuel_an||0;
  const ch=(d.financier?.charges_copro_an||0)+(d.financier?.taxe_fonciere_an||0);
  const dp=d.bien?.dpe||"C",tw=({A:0,B:0,C:50,D:150,E:300,F:500,G:700}[dp]||150)*sf;
  const fr=Math.round(px*.075),tot=px+fr+tw,ap=Math.round(tot*.3),em=tot-ap;
  const mens=Math.round(em*.038/12/(1-Math.pow(1+.038/12,-240))),ann=mens*12;
  const vac=Math.round(lo*.05),net=lo-ch-vac,cf=net-ann,yn=tot>0?(net/tot*100):0;
  return `<div class="section"><h3>Simulation</h3><div class="sim-grid">
    <div class="sim-box"><h4>Acquisition</h4>
    <div class="sim-row"><span class="sk">Prix</span><span class="sv">${(px/1e6).toFixed(2)}M\u20AC</span></div>
    <div class="sim-row"><span class="sk">Frais 7.5%</span><span class="sv">${(fr/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row"><span class="sk">Travaux DPE ${dp}</span><span class="sv">${(tw/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row sim-total"><span class="sk">Total</span><span class="sv">${(tot/1e6).toFixed(2)}M\u20AC</span></div>
    <div class="sim-row"><span class="sk">Apport 30%</span><span class="sv">${(ap/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row"><span class="sk">Emprunt</span><span class="sv">${(em/1e6).toFixed(2)}M\u20AC</span></div></div>
    <div class="sim-box"><h4>Exploitation an 1</h4>
    <div class="sim-row"><span class="sk">Loyer brut</span><span class="sv">${lo>0?(lo/1e3).toFixed(0)+"K\u20AC":"Vacant"}</span></div>
    <div class="sim-row"><span class="sk">Charges+TF</span><span class="sv">-${(ch/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row"><span class="sk">Vacance 5%</span><span class="sv">-${(vac/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row sim-total"><span class="sk">Net</span><span class="sv">${(net/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row"><span class="sk">Annuit\u00E9</span><span class="sv">-${(ann/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row sim-total"><span class="sk">Cashflow</span><span class="sv" style="color:${cf>=0?"var(--green)":"var(--red)"}">${(cf/1e3).toFixed(0)}K\u20AC</span></div>
    <div class="sim-row"><span class="sk">Yield net</span><span class="sv">${yn.toFixed(2)}%</span></div></div>
  </div></div>`;
}

function closeDw(){
  if(curKey&&D[curKey]){const n=document.getElementById("dwNotes");if(n)D[curKey]._notes=n.value;}
  document.getElementById("dw").classList.remove("open");document.getElementById("ov").classList.remove("open");curKey=null;
}
document.getElementById("dwClose").addEventListener("click",closeDw);
document.getElementById("ov").addEventListener("click",closeDw);
document.getElementById("dwTrash").addEventListener("click",()=>{if(curKey){setSt(curKey,"poubelle");closeDw();}});
document.getElementById("dwVerify").addEventListener("click",()=>{if(curKey){setSt(curKey,"a_verifier");closeDw();}});
document.getElementById("dwContact").addEventListener("click",()=>{if(curKey){setSt(curKey,"a_contacter");closeDw();}});
document.getElementById("dwSim").addEventListener("click",()=>{if(curKey){setSt(curKey,"simulation");closeDw();}});

window.setSt=(k,s)=>{if(D[k]){D[k]._statut=s;render();}};

init();
</script>
</body>
</html>
