<!DOCTYPE html>
<html><head><title>JLL Scraper</title></head>
<body style="font-family:Arial;padding:20px;background:#111;color:#eee">
<h2>JLL Scraper - Bureaux IDF</h2>
<p>1. Ouvre <a href="https://immobilier.jll.fr/search?propertyTypes=office&tenureTypes=sale&regions=Ile-de-France" target="_blank" style="color:#4af">immobilier.jll.fr (bureaux vente IDF)</a></p>
<p>2. Copie le script, F12 Console, Ctrl+V, Entree</p>
<p>3. Change l'URL : ajoute <code>&page=2</code> puis Entree (hard reload)</p>
<p>4. Recolle le script (fleche haut + Entree). Repete.</p>
<p>5. Quand fini : <code>copy(sessionStorage.getItem("_JLL"))</code></p>
<br>
<button onclick="copyCode()" style="padding:20px 40px;font-size:18px;background:#0066cc;color:#fff;border:none;border-radius:10px;cursor:pointer">COPIER LE SCRIPT</button>
<p id="status"></p>
<textarea id="code" style="width:100%;height:200px;background:#222;color:#0f0;font-family:monospace;font-size:11px" readonly></textarea>
<script>
var lines = [
'(function(){',
'var all=JSON.parse(sessionStorage.getItem("_JLL")||"[]");',
'var seen=JSON.parse(sessionStorage.getItem("_JLL_seen")||"{}");',
'var txt=document.body.innerText;',
'var blocks=txt.split("BUREAUX");',
'var n=0;',
'for(var i=1;i<blocks.length;i++){',
'var b=blocks[i];',
'var surfM=b.match(/(\\d[\\d\\s]+)\\s*m/);',
'var pxM=b.match(/(\\d[\\d\\s.,]+)\\s*\\u20ac\\s*\\/\\s*m/);',
'var cpM=b.match(/([A-Z][A-Z\\s-]+),\\s*(\\d{5})/);',
'var surf=surfM?parseFloat(surfM[1].replace(/\\s/g,"")):0;',
'var pxm2=pxM?parseFloat(pxM[1].replace(/\\s/g,"").replace(",",".")):0;',
'var prix=Math.round(pxm2*surf);',
'var cp=cpM?cpM[2]:"";',
'var ville=cpM?cpM[1].trim():"";',
'var addr=b.trim().split("\\n");',
'var adresse="";',
'for(var j=0;j<addr.length&&j<5;j++){',
'var line=addr[j].trim();',
'if(line.match(/^\\d+[\\s,-]/)&&!line.match(/\\u20ac/)&&!line.match(/m\\u00b2/)){adresse=line;break}',
'}',
'if(surf<50)continue;',
'var key=cp+"-"+surf+"-"+prix;',
'if(seen[key])continue;',
'seen[key]=1;n++;',
'all.push({source:"jll",url:"",date_scrape:new Date().toISOString().split("T")[0],',
'localisation:{adresse:adresse,code_postal:cp,commune:ville,departement:cp.substring(0,2)||"75"},',
'bien:{type:"bureaux",surface_m2:surf},',
'financier:{prix_affiche:prix,prix_m2:Math.round(pxm2)},',
'annonce:{titre:"Bureaux "+surf+"m2 "+ville,description:""}});',
'}',
'sessionStorage.setItem("_JLL",JSON.stringify(all));',
'sessionStorage.setItem("_JLL_seen",JSON.stringify(seen));',
'console.log("+"+n+" | Total: "+all.length);',
'console.log("-> Change URL: &page=2, &page=3... puis recolle");',
'console.log("-> Fini? copy(sessionStorage.getItem(\\"_JLL\\"))");',
'})();'
];
var scrapeCode = lines.join("");
document.getElementById("code").value = scrapeCode;
function copyCode(){
  navigator.clipboard.writeText(scrapeCode).then(function(){
    document.getElementById("status").innerHTML = "<b style='color:#0f0'>COPIE! Va sur JLL, F12, Ctrl+V, Entree</b>";
  }).catch(function(){
    document.getElementById("status").innerHTML = "<b style='color:red'>Selectionne et copie manuellement</b>";
  });
}
</script>
</body></html>
