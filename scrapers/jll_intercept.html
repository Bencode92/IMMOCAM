<!DOCTYPE html>
<html><head><title>JLL Scraper</title></head>
<body style="font-family:Arial;padding:20px;background:#111;color:#eee">
<h2>JLL Scraper - Bureaux IDF</h2>
<p>1. Ouvre <a href="https://immobilier.jll.fr/search?propertyTypes=office&tenureTypes=sale&regions=Ile-de-France" target="_blank" style="color:#4af">immobilier.jll.fr (bureaux vente IDF)</a></p>
<p>2. Clique le bouton ci-dessous pour copier le script</p>
<p>3. Va sur l'onglet JLL, F12 Console, Ctrl+V, Entree</p>
<p>4. Le script scrape toutes les pages automatiquement</p>
<br>
<button onclick="copyCode()" style="padding:20px 40px;font-size:20px;background:#0066cc;color:#fff;border:none;border-radius:10px;cursor:pointer">COPIER LE SCRIPT</button>
<br><br>
<p id="status"></p>
<textarea id="code" style="width:100%;height:200px;background:#222;color:#0f0;font-family:monospace;font-size:11px" readonly></textarea>
<script>
var lines = [
'var d=[],seen={},pg=1;',
'function scrapePage(){',
'var txt=document.body.innerText;',
'var blocks=txt.split("BUREAUX");',
'var n=0;',
'for(var i=1;i<blocks.length;i++){',
'var b=blocks[i];',
'var surfM=b.match(/(\\d[\\d\\s]+)\\s*m/);',
'var pxM=b.match(/(\\d[\\d\\s.,]+)\\s*\\u20ac\\s*\\/\\s*m/);',
'var cpM=b.match(/(\\d{5})/);',
'var villeM=b.match(/([A-Z][A-Z\\s-]+),\\s*\\d{5}/);',
'var addrLines=b.split("\\n");',
'var addr="";',
'for(var j=0;j<addrLines.length&&j<5;j++){',
'var line=addrLines[j].trim();',
'if(line.match(/^\\d+[\\s,]/)&&!line.match(/\\u20ac/)){addr=line;break}',
'}',
'var surf=surfM?parseFloat(surfM[1].replace(/\\s/g,"")):0;',
'var pxm2=pxM?parseFloat(pxM[1].replace(/\\s/g,"").replace(",",".")):0;',
'var prix=pxm2*surf;',
'var cp=cpM?cpM[1]:"";',
'var ville=villeM?villeM[1].trim():"";',
'var linkM=b.match(/([A-Z][A-Z\\s-]{2,})/);',
'var titre=linkM?linkM[1].trim():"Bureaux";',
'if(surf<50)continue;',
'var key=cp+"-"+surf;',
'if(seen[key])continue;',
'seen[key]=1;',
'n++;',
'd.push({source:"jll",url:"",date_scrape:new Date().toISOString().split("T")[0],',
'localisation:{adresse:addr,code_postal:cp,commune:ville,departement:cp.substring(0,2)||"75"},',
'bien:{type:"bureaux",surface_m2:surf},',
'financier:{prix_affiche:Math.round(prix),prix_m2:Math.round(pxm2)},',
'annonce:{titre:"Bureaux "+surf+"m2 "+ville,description:""}});',
'}',
'console.log("Page "+pg+": "+n+" biens (total: "+d.length+")");',
'return n;',
'}',
'function clickNext(){',
'var all=document.querySelectorAll("a[href*=page]");',
'for(var i=0;i<all.length;i++){',
'var t=all[i].textContent.trim();',
'if(t===""+(pg+1)){all[i].click();return true}',
'}',
'var btns=document.querySelectorAll("button,[role=button]");',
'for(var i=0;i<btns.length;i++){',
'var ar=btns[i].getAttribute("aria-label")||"";',
'if(ar.toLowerCase().indexOf("next")>-1||ar.toLowerCase().indexOf("suivant")>-1){btns[i].click();return true}',
'}',
'return false;',
'}',
'async function run(){',
'console.log("JLL scraper — 291 annonces bureaux IDF...");',
'scrapePage();',
'for(var i=0;i<30;i++){',
'pg++;',
'var ok=clickNext();',
'if(!ok){console.log("Pas de page suivante trouvee");break}',
'await new Promise(function(r){setTimeout(r,3000)});',
'scrapePage();',
'}',
'console.log("FINI! "+d.length+" biens");',
'console.table(d.slice(0,20).map(function(x){return{',
'surf:x.bien.surface_m2+"m2",',
'prix:x.financier.prix_affiche>1e6?(x.financier.prix_affiche/1e6).toFixed(2)+"M":(x.financier.prix_affiche/1e3).toFixed(0)+"K",',
'pm2:x.financier.prix_m2,',
'cp:x.localisation.code_postal,',
'ville:x.localisation.commune}}));',
'window._JLL=d;',
'console.log("Tape: copy(JSON.stringify(window._JLL))");',
'}',
'run();'
];
var scrapeCode = lines.join("");
document.getElementById("code").value = scrapeCode;
function copyCode(){
  navigator.clipboard.writeText(scrapeCode).then(function(){
    document.getElementById("status").innerHTML = "<b style='color:#0f0'>COPIE! Va sur JLL, F12 Console, Ctrl+V, Entree</b>";
  }).catch(function(){
    document.getElementById("status").innerHTML = "<b style='color:red'>Selectionne le texte ci-dessous et copie manuellement</b>";
  });
}
</script>
</body></html>
